<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Video: Watch live Tv</title>
    <link rel="stylesheet" href="./send-us-feedback.css"/>
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/png" href="./play button.png">
</head>
<body>
 
<div class="logo-section">
    <img src="./prime video.png" alt="Prime Video">
</div>

<div class="signin-box">

    <h1>Sign in</h1>

    <label>Enter mobile number or email</label>

    <input type="text" placeholder="Email or mobile number">

    <a href="#"><button class="continue-btn">
        Continue
    </button></a>

    <p class="terms">
        By continuing, you agree to the Amazon
        <a href="#">Conditions of Use</a>
        and
        <a href="#">Privacy Notice</a>.
    </p>

    <div class="help">
        Need help?
    </div>

</div>

<div class="divider">
    <span>New to Amazon?</span>
</div>

<button class="create-btn">
    Create your Amazon account
</button>
<div class="bottom-line"></div>


<footer>
    <a href="#">Terms and Privacy Notice</a>
    <a href="#">Send us feedback</a>
    <a href="#">Help</a>

    <p>© 1996-2026, Amazon.com, Inc. or its affiliates</p>
</footer>

</html>
